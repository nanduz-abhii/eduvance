{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<title>Check Attendance - Teacher Portal</title>

	<link rel="stylesheet" href="{% static 'mainpage/assets/bootstrap/css/bootstrap.min.css' %}">
	<link
		href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
		rel="stylesheet">
	<style>
		:root {
			--primary: #38bdf8;
			--secondary: #818cf8;
			--bg-dark: #0f172a;
			--card-bg: rgba(30, 41, 59, 0.7);
		}

		body {
			font-family: 'Outfit', sans-serif;
			background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 100%);
			color: #f8fafc;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		.navbar {
			background: rgba(15, 23, 42, 0.8);
			backdrop-filter: blur(10px);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
			padding: 1rem 0;
		}

		.navbar-brand img {
			height: 40px;
		}

		.nav-link {
			color: #cbd5e1 !important;
			font-weight: 500;
			transition: color 0.3s ease;
			margin: 0 10px;
		}

		.nav-link:hover {
			color: var(--primary) !important;
		}

		.main-container {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
		}

		.form-card {
			background: var(--card-bg);
			backdrop-filter: blur(16px);
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 24px;
			padding: 40px;
			width: 100%;
			max-width: 500px;
			box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
		}

		.form-title {
			font-size: 2rem;
			font-weight: 700;
			margin-bottom: 8px;
			background: linear-gradient(to right, var(--primary), var(--secondary));
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			text-align: center;
		}

		.form-subtitle {
			text-align: center;
			color: #94a3b8;
			margin-bottom: 32px;
		}

		.form-label {
			color: #94a3b8;
			font-weight: 500;
			margin-bottom: 8px;
			display: block;
		}

		.form-control,
		.form-select {
			background: rgba(15, 23, 42, 0.5);
			border: 1px solid rgba(255, 255, 255, 0.1);
			color: #f8fafc;
			border-radius: 12px;
			padding: 12px 16px;
			transition: all 0.3s ease;
		}

		.form-control:focus,
		.form-select:focus {
			background: rgba(15, 23, 42, 0.8);
			border-color: var(--primary);
			box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
			color: #fff;
		}

		.btn-submit {
			background: linear-gradient(to right, var(--primary), var(--secondary));
			color: white;
			border: none;
			border-radius: 12px;
			padding: 14px;
			font-weight: 600;
			width: 100%;
			margin-top: 24px;
			transition: all 0.3s ease;
		}

		.btn-submit:hover {
			transform: translateY(-2px);
			box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
			color: #fff;
		}

		footer {
			padding: 20px;
			text-align: center;
			color: #64748b;
			font-size: 0.875rem;
		}
	</style>
</head>

<body>
	<nav class="navbar navbar-expand-lg">
		<div class="container">
			<a class="navbar-brand" href="{% url 'tuser' %}">
				<img src="{% static 'mainpage/assets/img/logotwo.svg' %}" alt="EduVance">
			</a>
			<div class="collapse navbar-collapse justify-content-end">
				<ul class="navbar-nav">
					<li class="nav-item"><a class="nav-link" href="{% url 'tuser' %}">Dashboard</a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'studentsview' %}">Students</a></li>
					<li class="nav-item"><a class="nav-link" href="{% url 'tprofile' %}">Profile</a></li>
					<li class="nav-item"><a class="nav-link text-danger" href="{% url 'login' %}">Logout</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="main-container">
		<div class="form-card">
			<h1 class="form-title">Check Attendance</h1>
			<p class="form-subtitle">Subject-wise Attendance Filter</p>

			<form method="GET" action="{% url 'attendanceviewt' %}">
				<div class="mb-3">
					<label class="form-label">Department</label>
					{{ form.department }}
				</div>
				<div class="mb-3">
					<label class="form-label">Semester</label>
					{{ form.semester }}
				</div>
				<div class="mb-3">
					<label class="form-label">Subject Name</label>
					{{ form.subject }}
				</div>
				<div class="mb-3">
					<label class="form-label">Date</label>
					{{ form.date }}
				</div>

				<button type="submit" class="btn-submit">View Records</button>
			</form>
		</div>
	</div>

	<footer>
		&copy; 2025 EduVance Team. All rights reserved.
	</footer>

	<script src="{% static 'mainpage/assets/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
